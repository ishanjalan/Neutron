<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#0ea5e9" opacity="0.1"/>
  <circle cx="1100" cy="530" r="150" fill="#06b6d4" opacity="0.1"/>

  <!-- Logo icon -->
  <g transform="translate(100, 215)">
    <rect width="200" height="200" rx="40" fill="url(#accent)"/>
    <text x="100" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle">PDF</text>
  </g>

  <!-- Text -->
  <text x="350" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="white">
    Smash
  </text>
  <text x="350" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#a1a1aa">
    Privacy-First PDF Tools
  </text>
  <text x="350" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#71717a">
    Compress • Merge • Split • OCR • Protect
  </text>

  <!-- Feature pills -->
  <rect x="350" y="470" width="150" height="40" rx="20" fill="#0ea5e9" opacity="0.2"/>
  <text x="425" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#38bdf8" text-anchor="middle">100% Private</text>

  <rect x="515" y="470" width="130" height="40" rx="20" fill="#0ea5e9" opacity="0.2"/>
  <text x="580" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#38bdf8" text-anchor="middle">No Upload</text>

  <rect x="660" y="470" width="130" height="40" rx="20" fill="#0ea5e9" opacity="0.2"/>
  <text x="725" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#38bdf8" text-anchor="middle">13 PDF Tools</text>

  <!-- Tagline -->
  <text x="350" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#52525b">
    100% private — runs entirely in your browser
  </text>
</svg>
